<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
  /* PREMIUM INPUTS */
.auth-form input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  color:var(--text);
  font-size:.95rem;
  outline:none;
  backdrop-filter:blur(6px);
  transition:all .25s ease;
}

/* Placeholder */
.auth-form input::placeholder{
  color:rgba(255,255,255,0.3);
}

/* Focus state (this is key) */
.auth-form input:focus{
  border-color:rgba(63,126,42,0.6);
  box-shadow:0 0 0 2px rgba(63,126,42,0.15),
             0 8px 25px rgba(0,0,0,0.3);
  background:rgba(255,255,255,0.03);
}
    .primary-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(135deg,#3F7E2A,#2a5a1d);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:all .25s ease;
}

/* Hover */
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(63,126,42,.35);
}

/* Click */
.primary-btn:active{
  transform:scale(.98);
}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your player account to book arenas, join games, and track leagues.</p>
      <form class="auth-form" id="login-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </label>
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Sign in</button>
        <button class="btn btn-ghost btn-full" type="button" style="margin-top:8px">Continue with Google (Soon)</button>
      </form>
      <p class="auth-switch">New to Goalbazi? <a href="/register">Create an account</a></p>
      <p class="auth-switch" style="margin-top:8px"><a href="/">Back to landing page</a></p>
    </div>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Signing in...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Login failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
