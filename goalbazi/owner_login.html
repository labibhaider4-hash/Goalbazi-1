<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Arena Partner Login</title>
  <link rel="icon" type="image/svg+xml" href="/assets/goalbazi-logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .auth-shell{min-height:100vh;display:grid;place-items:center;padding:20px}
    .auth-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:36px;box-shadow:var(--shadow)}
    .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .auth-logo img{width:44px;border-radius:12px}
    .auth-logo span{font-size:1.3rem;font-weight:800;letter-spacing:-.03em}
    .auth-title{font-size:1.6rem;font-weight:800;letter-spacing:-.04em;margin:0 0 6px}
    .auth-sub{color:var(--muted);margin:0 0 28px;line-height:1.6}
    .auth-form{display:grid;gap:14px}
    .auth-form label{display:grid;gap:8px}
    .auth-form span{font-size:.85rem;color:var(--muted);font-weight:700}
    .auth-switch{margin-top:18px;text-align:center;color:var(--muted);font-size:.9rem}
    .auth-switch a{color:var(--brand);text-decoration:none;font-weight:700}
    .error-msg{color:var(--danger);font-size:.88rem;display:none}
    .role-badge{display:inline-block;padding:6px 14px;border-radius:999px;background:rgba(218,252,124,.12);border:1px solid rgba(218,252,124,.25);color:var(--brand-2);font-size:.82rem;font-weight:700;margin-bottom:20px}
    /* Structural fixes for inputs */
.auth-form input {
  width: 100%;
  padding: 12px 16px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.auth-form input:focus {
  outline: none;
  border-color: rgba(63,126,42,0.65);
  background: var(--panel);
  box-shadow: 0 0 0 2px rgba(63,126,42,.12);
}

/* Structural fixes for the sign-in button */
.primary-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg,#3F7E2A,#2a5a1d);
  color: #f7fff5;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Manrope', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
}

.primary-btn:hover {
  opacity: 0.98;
  transform: translateY(-1px);
  box-shadow: 0 10px 26px rgba(63,126,42,.28);
}

.primary-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div style="position:absolute;top:20px;right:20px;z-index:2">
      <button class="theme-toggle" id="owner-login-theme-toggle" type="button" data-theme-toggle></button>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <div class="role-badge">🏟️ Turf Owner Portal</div>
      <h1 class="auth-title">Arena Partner sign in</h1>
      <p class="auth-sub">Sign in to manage your arena reservations and payments.</p>
      <form class="auth-form" id="login-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" required>
        </label>
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Sign in</button>
        <button class="btn btn-ghost btn-full" type="button" style="margin-top:8px">Continue with Google (Soon)</button>
      </form>
      <p class="auth-switch">New Arena Partner? <a href="/owner/register">Register your arena</a></p>
      <p class="auth-switch" style="margin-top:8px">Are you an athlete? <a href="/login">Athlete login</a></p>
      <p class="auth-switch" style="margin-top:8px"><a href="/">Back to landing page</a></p>
    </div>
  </div>
  <script src="/nav.js"></script>
  <script>
    GoalbaziTheme.attachButton(document.getElementById("owner-login-theme-toggle"));

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Signing in...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/owner/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/owner/dashboard";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Login failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
