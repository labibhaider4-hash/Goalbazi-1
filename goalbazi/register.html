<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Register</title>
  <link rel="icon" type="image/svg+xml" href="/assets/goalbazi-logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
   /* PREMIUM INPUTS */
.auth-form input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--text);
  font-size:.95rem;
  outline:none;
  transition:all .25s ease;
  backdrop-filter:blur(6px);
}

/* Placeholder */
.auth-form input::placeholder{
  color:var(--muted);
}

/* Focus */
.auth-form input:focus{
  background:var(--panel);
  border-color:rgba(63,126,42,0.7);
  box-shadow:
    0 0 0 2px rgba(63,126,42,0.15),
    0 8px 25px rgba(0,0,0,0.4);
}

/* Labels better contrast */
.auth-form span{ color:var(--muted-2); }

/* OPTIONAL: make side-by-side fields feel aligned */
.field-grid input{
  height:48px;
}
    .primary-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(63,126,42,0.4);
  background:linear-gradient(135deg,#3F7E2A,#2a5a1d);
  color:#f7fff5;
  font-weight:700;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .3s ease;
}

/* 🔥 Glow effect */
.primary-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  opacity:0;
  transition:.4s;
}

/* Hover */
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 10px 30px rgba(63,126,42,.4),
    0 0 20px rgba(63,126,42,.25);
}

.primary-btn:hover::before{
  opacity:1;
  animation:shine 1.2s linear;
}

/* Click */
.primary-btn:active{
  transform:scale(.97);
}

/* Disabled */
.primary-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
  box-shadow:none;
}

/* Shine animation */
@keyframes shine{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div style="position:absolute;top:20px;right:20px;z-index:2">
      <button class="theme-toggle" id="register-theme-toggle" type="button" data-theme-toggle></button>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <h1 class="auth-title">Join Goalbazi</h1>
      <p class="auth-sub">Create your athlete account to reserve arenas, join matches, and track leagues across Delhi NCR.</p>
      <form class="auth-form" id="register-form">
        <div class="field-grid">
          <label>
            <span>Full name</span>
            <input name="name" placeholder="Arjun Rawat" required>
          </label>
          <label>
            <span>Username</span>
            <input name="handle" placeholder="arjun07" required>
          </label>
        </div>
        <div style="color:var(--muted);font-size:.82rem;margin-top:-4px">Only lowercase letters and numbers are kept. Your profile will show it as <strong>@username</strong>.</div>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </label>
        <label>
          <span>Location</span>
          <input name="location" placeholder="South Delhi" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Min 8 characters" required autocomplete="new-password">
        </label>
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Create account</button>
        <button class="btn btn-ghost btn-full" type="button" style="margin-top:8px">Continue with Google (Soon)</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
      <p class="auth-switch" style="margin-top:8px"><a href="/">Back to landing page</a></p>
    </div>
  </div>
  <script src="/nav.js"></script>
  <script>
    GoalbaziTheme.attachButton(document.getElementById("register-theme-toggle"));

    const handleInput = document.querySelector('input[name="handle"]');
    handleInput.addEventListener("input", () => {
      handleInput.value = handleInput.value.toLowerCase().replace(/[^a-z0-9]/g, "");
    });

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Creating account...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Registration failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Create account";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
