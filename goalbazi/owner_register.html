<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Arena Partner Register</title>
  <link rel="icon" type="image/svg+xml" href="/assets/goalbazi-logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ===== ELITE INPUTS (underline + glow) ===== */

.auth-form label{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* INPUT + SELECT */
.auth-form input,
.auth-form select{
  width:100%;
  padding:12px 2px;
  border:none; border-radius: 12px;
  border-bottom:1px solid var(--line-2);
  background:transparent;
  color:var(--text);
  font-size:.95rem;
  outline:none;
  transition:.3s ease;
  appearance:none;
}

/* Placeholder */
.auth-form input::placeholder{
  color:var(--muted);
}

/* Dropdown fix */
.auth-form select{
  cursor:pointer;
}

/* 🔥 animated glow line */
.auth-form label::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0%;
  height:2px;
  background:linear-gradient(90deg,#3F7E2A,#6CFF5E);
  transition:width .35s ease;
  box-shadow:0 0 12px rgba(63,126,42,.6);
}

/* focus trigger */
.auth-form label:focus-within::after{
  width:100%;
}

.auth-form input:focus,
.auth-form select:focus{
  border-bottom-color:transparent;
}

/* label text */
.auth-form span{
  color:var(--muted-2);
  font-size:.8rem;
  font-weight:600;
}

/* ===== ELITE BUTTON ===== */

.primary-btn{
  margin-top:10px;
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(63,126,42,0.4);
  background:linear-gradient(135deg,#3F7E2A,#2a5a1d);
  color:#f7fff5;
  font-weight:700;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .3s ease;
}

/* shine effect */
.primary-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent);
  opacity:0;
}

/* hover */
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 10px 30px rgba(63,126,42,.4),
    0 0 20px rgba(63,126,42,.25);
}

.primary-btn:hover::before{
  opacity:1;
  animation:shine 1s linear;
}

/* click */
.primary-btn:active{
  transform:scale(.97);
}

/* disabled */
.primary-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
  box-shadow:none;
}

/* animation */
@keyframes shine{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div style="position:absolute;top:20px;right:20px;z-index:2">
      <button class="theme-toggle" id="owner-register-theme-toggle" type="button" data-theme-toggle></button>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <div class="role-badge">🏟️ Arena Partner Account</div>
      <h1 class="auth-title">Register your arena</h1>
      <p class="auth-sub">Create an Arena Partner account to list your venue, manage reservations, and receive UPI payments directly.</p>
      <form class="auth-form" id="register-form">
        <div class="field-grid">
          <label>
            <span>Your name</span>
            <input name="name" placeholder="Rahul Sharma" required>
          </label>
          <label>
            <span>Phone number</span>
            <input name="phone" placeholder="98XXXXXXXX" required>
          </label>
        </div>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Min 8 characters" required>
        </label>
        <hr style="border-color:var(--line);margin:4px 0">
        <label>
          <span>Arena name</span>
          <input name="turf_name" placeholder="Siri Fort Sports Complex" required>
        </label>
        <div class="field-grid">
          <label>
            <span>Area / Location</span>
            <input name="area" placeholder="South Delhi" required>
          </label>
          <label>
            <span>Price per hour (₹)</span>
            <input type="number" name="price_per_hour" placeholder="600" required>
          </label>
        </div>
        <div class="field-grid">
          <label>
            <span>Surface type</span>
            <select name="surface">
              <option value="Astroturf">Astroturf</option>
              <option value="Natural grass">Natural grass</option>
              <option value="Concrete">Concrete</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </label>
          <label>
            <span>Distance from centre (km)</span>
            <input type="number" name="distance_km" placeholder="3.5" step="0.1" required>
          </label>
        </div>
        <label>
          <span>UPI ID (for payments)</span>
          <input name="upi_id" placeholder="yourname@upi" required>
        </label>
        <div class="field-grid">
          <label>
            <span>Map link</span>
            <input name="map_link" placeholder="Google Maps link">
          </label>
          <label>
            <span>GPS location</span>
            <button class="btn btn-ghost btn-full" type="button" id="owner-gps-btn">Use current location</button>
          </label>
        </div>
        <label>
          <span>Arena description</span>
          <input name="description" placeholder="Tell players what makes your arena special">
        </label>
        <label>
          <span>Arena image links</span>
          <textarea name="image_urls" placeholder="One image URL per line" style="min-height:100px;padding:12px;border-radius:12px;border:1px solid var(--line-2);background:transparent;color:var(--text);font-family:inherit"></textarea>
        </label>
        <input type="hidden" name="latitude">
        <input type="hidden" name="longitude">
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Create arena owner account</button>
        <button class="btn btn-ghost btn-full" type="button" style="margin-top:8px">Continue with Google (Soon)</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/owner/login">Sign in</a></p>
      <p class="auth-switch" style="margin-top:8px">Are you an athlete? <a href="/register">Athlete registration</a></p>
      <p class="auth-switch" style="margin-top:8px"><a href="/">Back to landing page</a></p>
    </div>
  </div>
  <script src="/nav.js"></script>
  <script>
    GoalbaziTheme.attachButton(document.getElementById("owner-register-theme-toggle"));

    document.getElementById("owner-gps-btn").addEventListener("click", () => {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition((pos) => {
        document.querySelector('input[name="latitude"]').value = pos.coords.latitude.toFixed(6);
        document.querySelector('input[name="longitude"]').value = pos.coords.longitude.toFixed(6);
        document.getElementById("owner-gps-btn").textContent = "GPS added";
      });
    });

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Creating account...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/owner/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/owner/dashboard";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Registration failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Create arena owner account";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
