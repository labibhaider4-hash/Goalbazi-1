<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Turf Owner Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .auth-shell{min-height:100vh;display:grid;place-items:center;padding:20px}
    .auth-card{width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:36px;box-shadow:var(--shadow)}
    .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .auth-logo img{width:44px;border-radius:12px}
    .auth-logo span{font-size:1.3rem;font-weight:800;letter-spacing:-.03em}
    .auth-title{font-size:1.6rem;font-weight:800;letter-spacing:-.04em;margin:0 0 6px}
    .auth-sub{color:var(--muted);margin:0 0 28px;line-height:1.6}
    .auth-form{display:grid;gap:14px}
    .auth-form label{display:grid;gap:8px}
    .auth-form span{font-size:.85rem;color:var(--muted);font-weight:700}
    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .auth-switch{margin-top:18px;text-align:center;color:var(--muted);font-size:.9rem}
    .auth-switch a{color:var(--brand);text-decoration:none;font-weight:700}
    .error-msg{color:var(--danger);font-size:.88rem;display:none}
    .role-badge{display:inline-block;padding:6px 14px;border-radius:999px;background:rgba(218,252,124,.12);border:1px solid rgba(218,252,124,.25);color:var(--brand-2);font-size:.82rem;font-weight:700;margin-bottom:20px}
    @media(max-width:500px){.field-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <div class="role-badge">🏟️ Turf Owner Account</div>
      <h1 class="auth-title">Register your turf</h1>
      <p class="auth-sub">Create a turf owner account to list your ground, manage bookings, and receive UPI payments directly.</p>
      <form class="auth-form" id="register-form">
        <div class="field-grid">
          <label>
            <span>Your name</span>
            <input name="name" placeholder="Rahul Sharma" required>
          </label>
          <label>
            <span>Phone number</span>
            <input name="phone" placeholder="98XXXXXXXX" required>
          </label>
        </div>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Min 8 characters" required>
        </label>
        <hr style="border-color:var(--line);margin:4px 0">
        <label>
          <span>Turf name</span>
          <input name="turf_name" placeholder="Siri Fort Sports Complex" required>
        </label>
        <div class="field-grid">
          <label>
            <span>Area / Location</span>
            <input name="area" placeholder="South Delhi" required>
          </label>
          <label>
            <span>Price per hour (₹)</span>
            <input type="number" name="price_per_hour" placeholder="600" required>
          </label>
        </div>
        <div class="field-grid">
          <label>
            <span>Surface type</span>
            <select name="surface">
              <option value="Astroturf">Astroturf</option>
              <option value="Natural grass">Natural grass</option>
              <option value="Concrete">Concrete</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </label>
          <label>
            <span>Distance from centre (km)</span>
            <input type="number" name="distance_km" placeholder="3.5" step="0.1" required>
          </label>
        </div>
        <label>
          <span>UPI ID (for payments)</span>
          <input name="upi_id" placeholder="yourname@upi" required>
        </label>
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Create turf owner account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/owner/login">Sign in</a></p>
      <p class="auth-switch" style="margin-top:8px">Are you a player? <a href="/register">Player registration</a></p>
    </div>
  </div>
  <script>
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Creating account...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/owner/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/owner/dashboard";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Registration failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Create turf owner account";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
