<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goalbazi — Login</title>
  <link rel="icon" type="image/svg+xml" href="/assets/goalbazi-logo.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/goalbazi-logo.svg">
  <meta name="theme-color" content="#07110d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Goalbazi">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
  /* PREMIUM INPUTS */
.auth-form input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--text);
  font-size:.95rem;
  outline:none;
  backdrop-filter:blur(6px);
  transition:all .25s ease;
}

/* Placeholder */
.auth-form input::placeholder{
  color:var(--muted);
}

/* Focus state (this is key) */
.auth-form input:focus{
  border-color:rgba(63,126,42,0.6);
  box-shadow:0 0 0 2px rgba(63,126,42,0.15),
             0 8px 25px rgba(0,0,0,0.3);
  background:var(--panel);
}
    .primary-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(63,126,42,0.25);
  background:linear-gradient(135deg,#3F7E2A,#2a5a1d);
  color:#f7fff5;
  font-weight:700;
  cursor:pointer;
  transition:all .25s ease;
}

/* Hover */
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(63,126,42,.35);
}

/* Click */
.primary-btn:active{
  transform:scale(.98);
}
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="auth-shell">
    <div style="position:absolute;top:20px;right:20px;z-index:2">
      <button class="theme-toggle" id="login-theme-toggle" type="button" data-theme-toggle></button>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/assets/goalbazi-logo.svg" alt="Goalbazi">
        <span>Goalbazi</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your athlete account to reserve arenas, join matches, and track leagues.</p>
      <form class="auth-form" id="login-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </label>
        <p class="error-msg" id="error-msg"></p>
        <button class="primary-btn" type="submit" id="submit-btn">Sign in</button>
        <a class="btn btn-ghost btn-full" href="/auth/google" style="margin-top:8px">Continue with Google</a>
      </form>
      <p class="auth-switch">New to Goalbazi? <a href="/register">Create an account</a></p>
      <p class="auth-switch" style="margin-top:8px"><a href="/">Back to landing page</a></p>
    </div>
  </div>
  <script src="/nav.js"></script>
  <script>
    GoalbaziTheme.attachButton(document.getElementById("login-theme-toggle"));

    const params = new URLSearchParams(window.location.search);
    const googleError = params.get("error");
    if (googleError) {
      const err = document.getElementById("error-msg");
      const messages = {
        google_not_configured: "Google login is not configured yet.",
        google_cancelled: "Google sign-in was cancelled.",
        google_state: "Google sign-in expired. Please try again.",
        google_missing_code: "Google sign-in did not complete. Please try again.",
        google_failed: "Google sign-in failed. Please try again.",
        google_profile: "Google did not return a usable profile.",
      };
      err.textContent = messages[googleError] || "Google sign-in failed. Please try again.";
      err.style.display = "block";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      const data = Object.fromEntries(new FormData(e.currentTarget).entries());
      btn.textContent = "Signing in...";
      btn.disabled = true;
      err.style.display = "none";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          window.location.href = "/";
        } else {
          const body = await res.json();
          err.textContent = body.error || "Login failed";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "Network error — please try again";
        err.style.display = "block";
      } finally {
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
